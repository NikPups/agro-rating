<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск компаний по ИНН</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Поиск компаний по ИНН</h1>
            <p>Введите ИНН для получения полной информации о компании</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="innInput" placeholder="Введите 10 или 12 цифр ИНН" maxlength="12" autocomplete="off">
                <button id="searchBtn">🔍 Найти</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Загрузка данных...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="companyInfo" class="company-info" style="display: none;"></div>
    </div>

    <script>
        const innInput = document.getElementById('innInput');
        const searchBtn = document.getElementById('searchBtn');
        const suggestionsDiv = document.getElementById('suggestions');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const companyInfoDiv = document.getElementById('companyInfo');

        let currentCompanyData = null;

        // Функция для форматирования числа
        function formatNumber(value) {
            if (value === undefined || value === null) return "0";
            return value.toLocaleString('ru-RU');
        }

        // Функция пересчёта экспертного рейтинга
        function recalculateExpertRating() {
            if (!currentCompanyData) return;
            
            // Получаем значения с ползунков
            let revW = parseFloat(document.getElementById('rev_weight').value) / 100;
            let profitW = parseFloat(document.getElementById('profit_weight').value) / 100;
            let balanceW = parseFloat(document.getElementById('balance_weight').value) / 100;
            let growthW = parseFloat(document.getElementById('growth_weight').value) / 100;
            let capitalW = parseFloat(document.getElementById('capital_weight').value) / 100;
            let debtsW = parseFloat(document.getElementById('debts_weight').value) / 100;
            let courtsW = parseFloat(document.getElementById('courts_weight').value) / 100;
            
            // Нормализуем положительные веса (сумма = 1)
            let totalPos = revW + profitW + balanceW + growthW + capitalW;
            if (totalPos > 0) {
                revW = revW / totalPos;
                profitW = profitW / totalPos;
                balanceW = balanceW / totalPos;
                growthW = growthW / totalPos;
                capitalW = capitalW / totalPos;
            }
            
            // Штрафные веса (доля от 10%)
            let totalPenalty = debtsW + courtsW;
            if (totalPenalty > 0) {
                debtsW = -(debtsW / totalPenalty) * 0.1;
                courtsW = -(courtsW / totalPenalty) * 0.1;
            }
            
            // Получаем нормализованные показатели компании
            let revNorm = currentCompanyData.rev_norm || 0;
            let profitNorm = currentCompanyData.profit_norm || 0;
            let balanceNorm = currentCompanyData.balance_norm || 0;
            let growthNorm = currentCompanyData.growth_norm || 0;
            let capitalNorm = currentCompanyData.capital_norm || 0;
            let debtsNorm = currentCompanyData.debts_norm || 0;
            let courtsNorm = currentCompanyData.courts_norm || 0;
            
            // Вычисляем сырой рейтинг
            let rawRating = 
                revW * revNorm +
                profitW * profitNorm +
                balanceW * balanceNorm +
                growthW * growthNorm +
                capitalW * capitalNorm +
                debtsW * debtsNorm +
                courtsW * courtsNorm;
            
            // Нормализуем в [0, 1] (предполагаем диапазон от -0.5 до 1.5)
            let finalRating = Math.min(1, Math.max(0, (rawRating + 0.5) / 1.5));
            let ratingPercent = (finalRating * 100).toFixed(1);
            
            // Определяем категорию
            let category = '';
            let categoryColor = '';
            if (finalRating >= 0.7) {
                category = 'Надёжный';
                categoryColor = '#28a745';
            } else if (finalRating >= 0.4) {
                category = 'Умеренный риск';
                categoryColor = '#ffc107';
            } else if (finalRating >= 0.2) {
                category = 'Рискованный';
                categoryColor = '#fd7e14';
            } else {
                category = 'Высокий риск';
                categoryColor = '#dc3545';
            }
            
            // Обновляем отображение
            const expertRatingDiv = document.getElementById('expert-rating');
            if (expertRatingDiv) {
                expertRatingDiv.innerHTML = `
                    <div class="rating-badge" style="background-color: ${categoryColor}">
                        🎯 Экспертный рейтинг: ${ratingPercent}%<br>
                        <small>${category}</small>
                    </div>
                `;
            }
        }

        // Функция отображения карточки компании
        function displayCompanyInfo(company) {
            currentCompanyData = company;
            const ratingPercent = (company.rating * 100).toFixed(1);
            
            let categoryColor = '#6c757d';
            if (company.category === 'Надёжный') categoryColor = '#28a745';
            else if (company.category === 'Умеренный риск') categoryColor = '#ffc107';
            else if (company.category === 'Рискованный') categoryColor = '#fd7e14';
            else if (company.category === 'Высокий риск') categoryColor = '#dc3545';
            
            let html = `
                <div class="card">
                    <div class="card-header">
                        <h2>${company.name}</h2>
                        <div class="rating-badge" style="background-color: ${categoryColor}">
                            📈 Базовый рейтинг: ${ratingPercent}%<br>
                            <small>${company.category}</small>
                        </div>
                    </div>
                    
                    <div id="expert-rating" class="rating-badge" style="background-color: #6c757d; margin: 15px 30px;">
                        🎯 Экспертный рейтинг: 0.0%<br>
                        <small>Настройте веса выше</small>
                    </div>
                    
                    <!-- Панель экспертных настроек -->
                    <div class="weights-panel">
                        <h3>⚙️ Экспертная настройка весов</h3>
                        <p>Настройте важность каждого показателя (положительные веса нормируются в сумму 100%)</p>
                        
                        <div class="weight-slider">
                            <label>📊 Выручка: <span id="rev_val">25.9</span>%</label>
                            <input type="range" id="rev_weight" min="0" max="100" step="1" value="25.9" oninput="document.getElementById('rev_val').innerText=this.value">
                        </div>
                        
                        <div class="weight-slider">
                            <label>💰 Прибыль: <span id="profit_val">25.3</span>%</label>
                            <input type="range" id="profit_weight" min="0" max="100" step="1" value="25.3" oninput="document.getElementById('profit_val').innerText=this.value">
                        </div>
                        
                        <div class="weight-slider">
                            <label>🏦 Баланс: <span id="balance_val">19.4</span>%</label>
                            <input type="range" id="balance_weight" min="0" max="100" step="1" value="19.4" oninput="document.getElementById('balance_val').innerText=this.value">
                        </div>
                        
                        <div class="weight-slider">
                            <label>📈 Рост: <span id="growth_val">6.3</span>%</label>
                            <input type="range" id="growth_weight" min="0" max="100" step="1" value="6.3" oninput="document.getElementById('growth_val').innerText=this.value">
                        </div>
                        
                        <div class="weight-slider">
                            <label>💼 Капитал: <span id="capital_val">13.1</span>%</label>
                            <input type="range" id="capital_weight" min="0" max="100" step="1" value="13.1" oninput="document.getElementById('capital_val').innerText=this.value">
                        </div>
                        
                        <div class="weight-slider risk">
                            <label>⚠️ Долги (штраф): <span id="debts_val">50</span>%</label>
                            <input type="range" id="debts_weight" min="0" max="100" step="1" value="50" oninput="document.getElementById('debts_val').innerText=this.value">
                            <span class="hint">(доля от 10% штрафных весов)</span>
                        </div>
                        
                        <div class="weight-slider risk">
                            <label>⚖️ Суды (штраф): <span id="courts_val">50</span>%</label>
                            <input type="range" id="courts_weight" min="0" max="100" step="1" value="50" oninput="document.getElementById('courts_val').innerText=this.value">
                            <span class="hint">(доля от 10% штрафных весов)</span>
                        </div>
                        
                        <div class="weight-buttons">
                            <button id="applyWeightsBtn">🎯 Применить настройки</button>
                            <button id="resetWeightsBtn">🔄 Сбросить</button>
                        </div>
                    </div>
                    
                    <div class="card-section">
                        <h3>Основная информация</h3>
                        <div class="info-grid">
                            <div class="info-item"><label>ИНН:</label><span>${company.inn}</span></div>
                            <div class="info-item"><label>ОГРН:</label><span>${company.ogrn}</span></div>
                            <div class="info-item"><label>Статус:</label><span>${company.status}</span></div>
                            <div class="info-item"><label>Дата регистрации:</label><span>${company.reg_date}</span></div>
                            <div class="info-item"><label>Регион:</label><span>${company.region}</span></div>
                            <div class="info-item"><label>Руководитель:</label><span>${company.director}</span></div>
                            <div class="info-item"><label>Код ОКВЭД:</label><span>${company.code}</span></div>
                            <div class="info-item"><label>Уставной капитал:</label><span>${company.capital} руб.</span></div>
                        </div>
                    </div>
                    
                    <div class="card-section">
                        <h3>Финансовые показатели (последний год)</h3>
                        <div class="info-grid">
                            <div class="info-item"><label>Выручка:</label><span>${company.last_revenue} тыс. руб.</span></div>
                            <div class="info-item"><label>Прибыль:</label><span>${company.last_profit} тыс. руб.</span></div>
                            <div class="info-item"><label>Баланс:</label><span>${company.last_balance} тыс. руб.</span></div>
                        </div>
                    </div>
                    
                    <div class="card-section">
                        <h3>Правовые риски</h3>
                        <div class="info-grid">
                            <div class="info-item"><label>Долговые производства:</label><span>${company.debts}</span></div>
                            <div class="info-item"><label>Истец в делах:</label><span>${company.plaintiff}</span></div>
                            <div class="info-item"><label>Ответчик в делах:</label><span>${company.defendant}</span></div>
                            <div class="info-item"><label>Финансовый статус:</label><span>${company.finance_status}</span></div>
                        </div>
                    </div>
            `;
            
            if (company.fin_by_year && company.fin_by_year.length > 0) {
                html += `
                    <div class="card-section">
                        <h3>Динамика по годам</h3>
                        <div class="table-container">
                            <table class="finance-table">
                                <thead>
                                    <tr><th>Год</th><th>Выручка (тыс. руб.)</th><th>Прибыль (тыс. руб.)</th><th>Баланс (тыс. руб.)</th></tr>
                                </thead>
                                <tbody>
                `;
                for (const year of company.fin_by_year) {
                    html += `<tr><td>${year.year}</td><td>${year.revenue}</td><td>${year.profit}</td><td>${year.balance}</td></tr>`;
                }
                html += `</tbody></table></div></div>`;
            }
            
            html += `</div>`;
            companyInfoDiv.innerHTML = html;
            companyInfoDiv.style.display = 'block';
            
            // Привязываем события к кнопкам
            document.getElementById('applyWeightsBtn').addEventListener('click', recalculateExpertRating);
            document.getElementById('resetWeightsBtn').addEventListener('click', function() {
                document.getElementById('rev_weight').value = 25.9;
                document.getElementById('rev_val').innerText = '25.9';
                document.getElementById('profit_weight').value = 25.3;
                document.getElementById('profit_val').innerText = '25.3';
                document.getElementById('balance_weight').value = 19.4;
                document.getElementById('balance_val').innerText = '19.4';
                document.getElementById('growth_weight').value = 6.3;
                document.getElementById('growth_val').innerText = '6.3';
                document.getElementById('capital_weight').value = 13.1;
                document.getElementById('capital_val').innerText = '13.1';
                document.getElementById('debts_weight').value = 50;
                document.getElementById('debts_val').innerText = '50';
                document.getElementById('courts_weight').value = 50;
                document.getElementById('courts_val').innerText = '50';
                recalculateExpertRating();
            });
            
            // Первый расчёт экспертного рейтинга
            recalculateExpertRating();
        }

        async function searchCompany(inn) {
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            companyInfoDiv.style.display = 'none';
            
            try {
                const response = await fetch(`/search?inn=${encodeURIComponent(inn)}`);
                const data = await response.json();
                
                if (response.ok) {
                    displayCompanyInfo(data);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Ошибка при загрузке данных');
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function fetchSuggestions(query) {
            try {
                const response = await fetch(`/suggest?q=${encodeURIComponent(query)}`);
                const suggestions = await response.json();
                if (suggestions.length > 0) {
                    suggestionsDiv.innerHTML = suggestions.map(s => `
                        <div class="suggestion-item" onclick="selectSuggestion('${s.inn}')">
                            <strong>${s.inn}</strong>
                            <span>${s.name}</span>
                            <span class="category-badge ${s.category.replace(/ /g, '-')}">${s.category}</span>
                        </div>
                    `).join('');
                    suggestionsDiv.style.display = 'block';
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            } catch (error) {
                suggestionsDiv.style.display = 'none';
            }
        }

        function selectSuggestion(inn) {
            innInput.value = inn;
            suggestionsDiv.style.display = 'none';
            searchCompany(inn);
        }

        let searchTimeout;
        innInput.addEventListener('input', function() {
            const query = this.value.trim();
            if (query.length < 3) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchSuggestions(query);
            }, 300);
        });

        searchBtn.addEventListener('click', () => searchCompany(innInput.value.trim()));
        innInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCompany(innInput.value.trim());
        });
        
        // Делаем функцию глобальной для onclick
        window.selectSuggestion = selectSuggestion;
    </script>
</body>
</html>
